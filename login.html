<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Вхід</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">
  <h2>🔐 Вхід в систему</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Пароль">

  <button onclick="login()">Увійти</button>
  <p class="error" id="error"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1lGYxdhZxhxdHtDFI26DI6sAfsZ3BI3s",
  authDomain: "project-3640254844635182653.firebaseapp.com",
  databaseURL: "https://project-3640254844635182653-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "project-3640254844635182653",
  storageBucket: "project-3640254844635182653.firebasestorage.app",
  messagingSenderId: "520268018148",
  appId: "1:520268018148:web:4d6ca65e683e1193e997f1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "index.html";
    })
    .catch(() => {
      document.getElementById("error").innerText = "Невірні дані!";
    });
}
</script>

</body>
</html>
