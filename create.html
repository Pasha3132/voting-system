<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Створити голосування</title>

</head>

<body>

  <h1>Створити нове голосування</h1>

  <button onclick="createVote()">Обнулити результати</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1lGYxdhZxhxdHtDFI26DI6sAfsZ3BI3s",
  authDomain: "project-3640254844635182653.firebaseapp.com",
  databaseURL: "https://project-3640254844635182653-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "project-3640254844635182653",
  storageBucket: "project-3640254844635182653.firebasestorage.app",
  messagingSenderId: "520268018148",
  appId: "1:520268018148:web:4d6ca65e683e1193e997f1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.createVote = function() {
  set(ref(db, "votes"), {
    candidate1: 0,
    candidate2: 0,
    total: 0
  });

  alert("Голосування створено (дані обнулено)");
}
</script>
