<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Створити голосування</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>Створити голосування</h1>
  <button id="btn">Обнулити результати</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1lGYxdhZxhxdHtDFI26DI6sAfsZ3BI3s",
  databaseURL: "https://project-3640254844635182653-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

document.getElementById("btn").onclick = () => {
  set(ref(db, "votes"), {
    candidate1: 0,
    candidate2: 0,
    total: 0
  });

  alert("Голосування створено");
};

</script>

</body>
</html>
