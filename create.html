<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Створити голосування</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="create-container">
  <h1>Створити голосування</h1>

  <input type="text" id="title" placeholder="Назва голосування">

  <input type="text" id="candidate1" placeholder="Кандидат 1">
  <input type="text" id="candidate2" placeholder="Кандидат 2">

  <button id="createBtn">Створити голосування</button>

  <p id="status"></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC1lGYxdhZxhxdHtDFI26DI6sAfsZ3BI3s",
    authDomain: "project-3640254844635182653.firebaseapp.com",
    databaseURL: "https://project-3640254844635182653-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "project-3640254844635182653",
    storageBucket: "project-3640254844635182653.firebasestorage.app",
    messagingSenderId: "520268018148",
    appId: "1:520268018148:web:4d6ca65e683e1193e997f1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const btn = document.getElementById("createBtn");

  btn.addEventListener("click", () => {
    const title = document.getElementById("title").value;
    const c1 = document.getElementById("candidate1").value;
    const c2 = document.getElementById("candidate2").value;

    if (!title || !c1 || !c2) {
      document.getElementById("status").innerText = "Заповни всі поля!";
      return;
    }

    const id = Date.now();

    set(ref(db, "polls/" + id), {
      title: title,
      candidates: {
        candidate1: c1,
        candidate2: c2
      },
      votes: {
        candidate1: 0,
        candidate2: 0,
        total: 0
      }
    });

    document.getElementById("status").innerText = "Голосування створено!";
  });
</script>

</body>
</html>
