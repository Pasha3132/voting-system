<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Створити голосування</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="create-container">
  <h1>Створити голосування</h1>

  <input type="text" id="title" placeholder="Назва голосування">

  <input type="text" id="option1" placeholder="Варіант 1">
  <input type="text" id="option2" placeholder="Варіант 2">

  <button id="createBtn">Створити</button>

  <p id="status"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1lGYxdhZxhxdHtDFI26DI6sAfsZ3BI3s",
  databaseURL: "https://project-3640254844635182653-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

document.getElementById("createBtn").onclick = () => {
  const title = document.getElementById("title").value;
  const option1 = document.getElementById("option1").value;
  const option2 = document.getElementById("option2").value;

  if (!title || !option1 || !option2) {
    document.getElementById("status").innerText = "Заповни всі поля!";
    return;
  }

  const id = Date.now();

  set(ref(db, "polls/" + id), {
    title: title,
    options: {
      option1: option1,
      option2: option2
    },
    votes: {
      option1: 0,
      option2: 0,
      total: 0
    },
    createdAt: id
  });

  set(ref(db, "activePoll"), String(id));

  document.getElementById("status").innerText = "Голосування створено!";
};
</script>

</body>
</html>
