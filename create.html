<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Створити голосування</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="create-container">
  <h1>Створити голосування</h1>

  <input type="text" id="title" placeholder="Назва голосування">

  <input type="text" id="option1" placeholder="Варіант 1">
  <input type="text" id="option2" placeholder="Варіант 2">

  <button id="createBtn">Створити</button>

  <p id="status"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// 🔥 Твій Firebase
const firebaseConfig = {
  apiKey: "AIzaSyC1lGYxdhZxhxdHtDFI26DI6sAfsZ3BI3s",
  databaseURL: "https://project-3640254844635182653-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// =====================
// КНОПКА СТВОРЕННЯ
// =====================
document.getElementById("createBtn").onclick = async () => {

  const title = document.getElementById("title").value.trim();
  const option1 = document.getElementById("option1").value.trim();
  const option2 = document.getElementById("option2").value.trim();

  const status = document.getElementById("status");

  if (!title || !option1 || !option2) {
    status.innerText = "⚠ Заповни всі поля!";
    return;
  }

  const id = Date.now();

  try {
    // 1. створюємо голосування
    await set(ref(db, "polls/" + id), {
      title: title,
      options: {
        option1: option1,
        option2: option2
      },
      votes: {
        option1: 0,
        option2: 0,
        total: 0
      },
      createdAt: id
    });

    // 2. робимо його активним
    await set(ref(db, "activePoll"), String(id));

    status.innerText = "✅ Голосування створено і активовано!";

    // очистка полів
    document.getElementById("title").value = "";
    document.getElementById("option1").value = "";
    document.getElementById("option2").value = "";

  } catch (error) {
    console.error(error);
    status.innerText = "❌ Помилка при створенні";
  }
};
</script>

</body>
</html>
