<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Активні голосування</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="admin-container">
  <h1>Активні голосування</h1>

  <div id="pollsList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1lGYxdhZxhxdHtDFI26DI6sAfsZ3BI3s",
  databaseURL: "https://project-3640254844635182653-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const pollsList = document.getElementById("pollsList");

onValue(ref(db, "polls"), (snapshot) => {
  pollsList.innerHTML = "";

  const data = snapshot.val();

  if (!data) {
    pollsList.innerHTML = "<p>Немає голосувань</p>";
    return;
  }

  Object.keys(data).forEach(id => {
    const poll = data[id];

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${poll.title}</h3>

      <p>${poll.options.option1}: ${poll.votes.option1}</p>
      <p>${poll.options.option2}: ${poll.votes.option2}</p>

      <strong>Всього: ${poll.votes.total}</strong>
    `;

    pollsList.appendChild(div);
  });
});
</script>

</body>
</html>
