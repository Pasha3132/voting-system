<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Активні голосування</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="admin-container">
  <h1>Активні голосування</h1>

  <button onclick="endPoll()">⛔ Завершити голосування</button>

  <div id="polls"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1lGYxdhZxhxdHtDFI26DI6sAfsZ3BI3s",
  databaseURL: "https://project-3640254844635182653-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("polls");

// ===================
// Вивід голосувань
// ===================
onValue(ref(db, "polls"), (snapshot) => {
  container.innerHTML = "";

  const data = snapshot.val();

  if (!data) {
    container.innerHTML = "<p>Немає голосувань</p>";
    return;
  }

  Object.keys(data).forEach(id => {
    const poll = data[id];

    const div = document.createElement("div");
    div.className = "card";
    div.id = "poll-" + id;

    div.innerHTML = `
      <h3>${poll.title}</h3>

      <button onclick="setActive('${id}')">🟢 Активне</button>
      <button onclick="deletePoll('${id}')">❌ Видалити</button>

      <p>${poll.options.option1}: ${poll.votes.option1}</p>
      <p>${poll.options.option2}: ${poll.votes.option2}</p>
      <p><b>Всього: ${poll.votes.total}</b></p>
    `;

    container.appendChild(div);
  });
});

// ===================
// Активне голосування
// ===================
onValue(ref(db, "activePoll"), (snapshot) => {
  const activeID = snapshot.val();

  document.querySelectorAll(".card").forEach(card => {
    card.style.border = "none";
  });

  if (activeID) {
    const activeCard = document.getElementById("poll-" + activeID);
    if (activeCard) {
      activeCard.style.border = "2px solid #4caf50";
    }
  }
});

// ===================
// ФУНКЦІЇ
// ===================
window.setActive = function(id) {
  set(ref(db, "activePoll"), id);
};

window.endPoll = function() {
  if (confirm("Завершити голосування?")) {
    set(ref(db, "activePoll"), null);
  }
};

window.deletePoll = function(id) {
  if (confirm("Видалити голосування?")) {
    remove(ref(db, "polls/" + id));
  }
};
</script>

</body>
</html>
