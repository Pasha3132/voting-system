<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Активні голосування</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="admin-container">
  <h1>Активні голосування</h1>

  <div id="polls"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1lGYxdhZxhxdHtDFI26DI6sAfsZ3BI3s",
  databaseURL: "https://project-3640254844635182653-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("polls");

onValue(ref(db, "polls"), (snapshot) => {
  container.innerHTML = "";
  const data = snapshot.val();

  if (!data) {
    container.innerHTML = "<p>Немає голосувань</p>";
    return;
  }

  Object.keys(data).forEach(id => {
    const poll = data[id];

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${poll.title}</h3>

      <button onclick="showResults('${id}')">📊 Результати</button>
      <button onclick="deletePoll('${id}')">❌ Видалити</button>

      <div id="results-${id}" class="results" style="display:none;">
        <canvas id="chart-${id}"></canvas>
      </div>
    `;

    container.appendChild(div);
  });
});

window.showResults = async function(id) {
  const block = document.getElementById("results-" + id);

  if (block.style.display === "block") {
    block.style.display = "none";
    return;
  }

  const snapshot = await get(ref(db, "polls/" + id));
  const poll = snapshot.val();

  const v1 = poll.votes.option1 || 0;
  const v2 = poll.votes.option2 || 0;

  const ctx = document.getElementById("chart-" + id).getContext("2d");

  new Chart(ctx, {
    type: "bar",
    data: {
      labels: [poll.options.option1, poll.options.option2],
      datasets: [{
        label: "Голоси",
        data: [v1, v2]
      }]
    }
  });

  block.style.display = "block";
};

window.deletePoll = function(id) {
  if (confirm("Видалити голосування?")) {
    remove(ref(db, "polls/" + id));
  }
};
</script>

</body>
</html>
