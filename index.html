  messagingSenderId: "520268018148",

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// перевірка входу
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});

// logout
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
}
</script>
