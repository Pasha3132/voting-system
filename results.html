<!DOCTYPE html>
<html>
<head>
  <title>Результати</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">
  <h1>📊 Результати голосування</h1>

  <div class="card">
    <p>Загальна кількість</p>
    <div class="value" id="total">0</div>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1lGYxdhZxhxdHtDFI26DI6sAfsZ3BI3s",
  databaseURL: "https://project-3640254844635182653-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const totalRef = ref(db, "votes/total");

let chart = new Chart(document.getElementById("chart"), {
  type: "bar",
  data: {
    labels: ["Голоси"],
    datasets: [{
      label: "Кількість",
      data: [0]
    }]
  }
});

onValue(totalRef, (snapshot) => {
  let val = snapshot.val() || 0;

  document.getElementById("total").innerText = val;

  chart.data.datasets[0].data[0] = val;
  chart.update();
});
</script>

</body>
</html>
